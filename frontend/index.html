<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solace AI - Mental Wellness Companion</title>
    <link rel="stylesheet" href="style.css">
    <!-- Using Google Fonts for a clean, modern look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="chat-container">
        <!-- Header -->
        <div class="chat-header">
            <h2>Solace AI 💙</h2>
            <p>Your empathetic mental wellness companion</p>
        </div>

        <!-- Scrollable Messages Area -->
        <div class="chat-messages" id="chat-messages">
            <div class="message bot-message">
                Hello! I'm Solace AI. I'm here to listen and support you. How are you feeling today?
            </div>
            <!-- Dynamic messages will be appended here -->
        </div>

        <!-- Input Area -->
        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Type your message here..." autocomplete="off">
            <button id="send-btn" disabled aria-label="Send Message">
                <!-- Simple SVG Send Icon -->
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
